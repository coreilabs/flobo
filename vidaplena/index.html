  <style>
    body {
      background: #f8f9fa;

    .navbar-custom {
      background-color: #049269;

    .navbar-custom .navbar-brand img {

      color: #fff !important;
      font-weight: 500;
    }

    .navbar-custom .nav-link:hover {
      opacity: 0.8;
    }

    /* Swiper */
    .swiper {
      width: 100%;
      padding: 20px 0;
    }

    .swiper-slide {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .swiper-slide img {
      width: 100%;
      height: auto;
      border-radius: 12px;
      object-fit: cover;
    }

    @media (min-width: 768px) {
      .swiper-slide img {
        max-height: 400px;
      }
    }
  </style>

<!-- Indicador de swipe -->
<div class="text-center mb-3">

<!-- Bootstrap JS -->

<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
  const swiper = new Swiper(".mySwiper", {
    slidesPerView: 1,
    spaceBetween: 10,
    loop: true,
    grabCursor: true,

    breakpoints: {
      576: {
        slidesPerView: 1
      },
      768: {
        slidesPerView: 2
      },
      992: {
        slidesPerView: 3
      }
    }
  });
</script>
